<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mateos.ai logo" viewBox="43 43 114 114">
  <!--
    Mateos.ai - three circles in a 2x2 square grid (top-left omitted)
    Equal radius, one per brand color.
      indigo : #5B53E8
      teal   : #17BEBB
      amber  : #FF8C42
    Grid: cell centers at 70 / 130, circle radius 27.
  -->
  <!-- top-left cell intentionally empty -->
  <circle cx="130" cy="70" r="27" fill="#FF8C42"/>  <!-- top-right -->
  <circle cx="70" cy="130" r="27" fill="#17BEBB"/>  <!-- bottom-left -->
  <circle cx="130" cy="130" r="27" fill="#5B53E8"/>  <!-- bottom-right -->
</svg>